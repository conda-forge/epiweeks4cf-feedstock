{% set name = "epiweeks4cf" %}
{% set version = "2.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:

  url: https://pypi.org/packages/source/{{ name[0] }}/epiweeks/epiweeks-{{ version }}.tar.gz
  sha256: 0096132a50cfc4b52b2bfc8cf841d278740414d01cac303df05146db8b526539

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=51
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - epiweeks
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/dralshehri/epiweeks
  summary: Epidemiological weeks calculation based on the US CDC (MMWR) and ISO week numbering systems
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jdhughes-usgs
